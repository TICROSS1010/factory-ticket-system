<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Factory Ticket System — Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111827;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }

        .navbar {
            background: #1f2937;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
        }

        .nav-title {
            color: #f9fafb;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-back {
            color: #6b7280;
            font-size: 12px;
            text-decoration: none;
            border: 1px solid #374151;
            border-radius: 3px;
            padding: 3px 10px;
        }

        .nav-back:hover {
            color: #9ca3af;
            border-color: #4b5563;
        }

        .content {
            padding: 48px 20px;
            max-width: 720px;
            margin: 0 auto;
        }

        .status-code {
            color: #dc2626;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .error-label {
            color: #6b7280;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 24px;
        }

        .error-block {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .error-block-label {
            color: #6b7280;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .error-block-value {
            color: #e5e7eb;
            font-size: 13px;
            word-break: break-word;
        }

        .trace-block {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .trace-block-label {
            color: #6b7280;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .trace-pre {
            color: #9ca3af;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .path-text {
            color: #f59e0b;
        }
    </style>
</head>
<body>

<div class="navbar">
    <span class="nav-title">FACTORY TICKET SYSTEM</span>
    <a class="nav-back" href="/tickets">← BACK</a>
</div>

<div class="content">

    <div class="status-code" th:text="${status}">500</div>
    <div class="error-label" th:text="${error}">Internal Server Error</div>

    <div class="error-block" th:if="${message != null and !message.isEmpty()}">
        <div class="error-block-label">Message</div>
        <div class="error-block-value" th:text="${message}"></div>
    </div>

    <div class="error-block" th:if="${path != null}">
        <div class="error-block-label">Path</div>
        <div class="error-block-value path-text" th:text="${path}"></div>
    </div>

    <div class="error-block">
        <div class="error-block-label">Timestamp</div>
        <div class="error-block-value" th:text="${timestamp}"></div>
    </div>

    <div class="trace-block" th:if="${trace != null}">
        <div class="trace-block-label">Stack Trace</div>
        <pre class="trace-pre" th:text="${trace}"></pre>
    </div>

</div>

</body>
</html>
