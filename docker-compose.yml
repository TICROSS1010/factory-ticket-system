services:
  dynamodb-local:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - ./dynamodb-data:/data
    working_dir: /home/dynamodblocal
    user: root
    networks:
      - factory-network

  dynamodb-setup:
    image: amazon/aws-cli
    depends_on:
      - dynamodb-local
    networks:
      - factory-network
    environment:
      - AWS_ACCESS_KEY_ID=fakekey
      - AWS_SECRET_ACCESS_KEY=fakekey
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Waiting for DynamoDB Local...'
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; do sleep 1; done
        echo 'DynamoDB Local ready'

        aws dynamodb describe-table --table-name orders --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1 || aws dynamodb create-table --table-name orders --attribute-definitions AttributeName=orderId,AttributeType=S --key-schema AttributeName=orderId,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000

        aws dynamodb describe-table --table-name orderHistory --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1 || aws dynamodb create-table --table-name orderHistory --attribute-definitions AttributeName=orderId,AttributeType=S AttributeName=timestamp,AttributeType=S --key-schema AttributeName=orderId,KeyType=HASH AttributeName=timestamp,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000

        echo 'Setup complete'
        aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_BACKEND_URL=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - factory-network

networks:
  factory-network:
    driver: bridge