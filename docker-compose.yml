services:
  dynamodb-local:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"

  dynamodb-setup:
    image: amazon/aws-cli
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=fakekey
      - AWS_SECRET_ACCESS_KEY=fakekey
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: /bin/sh -c "sleep 10 && aws dynamodb create-table --table-name orders --attribute-definitions AttributeName=orderId,AttributeType=S --key-schema AttributeName=orderId,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 && aws dynamodb create-table --table-name orderHistory --attribute-definitions AttributeName=orderId,AttributeType=S AttributeName=timestamp,AttributeType=S --key-schema AttributeName=orderId,KeyType=HASH AttributeName=timestamp,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 && echo 'Tables created successfully'"